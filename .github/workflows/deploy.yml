name: Deploy to Fly.io

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Notify Slack (start)
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"text": ":hourglass_flowing_sand: *demo* deploy started."}'

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Notify Slack (success)
        if: success()
        run: |
          duration=$(( $(date +%s) - ${{ steps.timer.outputs.start }} ))
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \":rocket: *demo* deployed successfully in ${duration}s.\n<https://demo-8xqghg.fly.dev|https://demo-8xqghg.fly.dev>\"}"

      - name: Notify Slack (failure)
        if: failure()
        run: |
          duration=$(( $(date +%s) - ${{ steps.timer.outputs.start }} ))
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \":x: *demo* deployment failed after ${duration}s.\"}"
